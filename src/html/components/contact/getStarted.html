<section class="get-started">
  <div class="container get-started__container">
    <div class="get-started__form-wrapper">
      <h3 class="get-started__form-title heading-h4">Let’s level up your brand</h3>
      <p class="get-started__form-text text-p-medium">
        You can reach us anytime
        <a href="mailto:hellosansbrothers@gmail.com" class="get-started__form-link"
          >hellosansbrothers@gmail.com</a
        >
      </p>
      <form class="get-started__form">
        <div class="get-started__form-top">
          <label class="get-started__form-label">
            <span class="get-started__form-label-text text-p-small"> First name</span>
            <input
              required
              type="text"
              class="get-started__form-input text-p-small get-started__form-input--small"
              placeholder="First name"
              name="first name"
            />
          </label>
          <label class="get-started__form-label">
            <span class="get-started__form-label-text text-p-small"> Last name</span>
            <input
              required
              type="text"
              class="get-started__form-input text-p-small get-started__form-input--small"
              placeholder="Last name"
              name="Last name"
            />
          </label>
        </div>
        <label class="get-started__form-label">
          <span class="get-started__form-label-text text-p-small">Email</span>
          <input
            required
            type="email"
            class="get-started__form-input text-p-small get-started__form-input"
            placeholder="you@company.com"
            name="Email"
          />
        </label>
        <label class="get-started__form-label">
          <span class="get-started__form-label-text text-p-small">Phone number</span>
          <input
            required
            id="phone"
            type="tel"
            class="get-started__form-input text-p-small get-started__form-input"
            placeholder=""
            name="phone"
          />
        </label>
        <label class="get-started__form-label">
          <span class="get-started__form-label-text text-p-small">Message</span>
          <textarea
            required
            type="text"
            class="get-started__form-input get-started__form-input--textarea text-p-small get-started__form-input"
            placeholder="Leave us a message..."
            name="message"
          ></textarea>
        </label>
        <button class="get-started__form-btn button-form">Get Started</button>
      </form>
    </div>
    <img
      src="./assets/images/Image.jpg"
      alt="A woman and a man high-five each other"
      width="987"
      height="885"
      loading="lazy"
      class="get-started__img"
    />
  </div>
</section>
